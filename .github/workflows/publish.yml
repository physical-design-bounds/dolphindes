name: Publish to PyPI

# Publishes to PyPI when a GitHub release is published. Uses PyPI Trusted
# Publishing (OIDC) — no API token or secret is stored in this repo.
on:
  release:
    types: [published]

jobs:
  build:
    # Reuse the exact build that runs on every CI check (see build.yml) so the
    # release ships precisely what was already validated on the merged commit.
    uses: ./.github/workflows/build.yml

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The privileged job does nothing but publish pre-built artifacts.
    environment:
      name: pypi
      url: https://pypi.org/project/dolphindes/
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
