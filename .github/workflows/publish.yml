name: Publish to PyPI

# Publishes to PyPI when a GitHub release is published. Uses PyPI Trusted
# Publishing (OIDC) — no API token or secret is stored in this repo.
on:
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - name: Verify the wheel ships every subpackage
        run: |
          python -m venv /tmp/whlcheck
          /tmp/whlcheck/bin/pip install --no-deps dist/*.whl
          /tmp/whlcheck/bin/python - <<'PY'
          import importlib.util as u
          mods = ["dolphindes", "dolphindes.photonics", "dolphindes.maxwell",
                  "dolphindes.cvxopt", "dolphindes.geometry", "dolphindes.util"]
          missing = [m for m in mods if u.find_spec(m) is None]
          assert not missing, f"built wheel is missing subpackages: {missing}"
          print("wheel contains all subpackages:", mods)
          PY
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The privileged job does nothing but publish pre-built artifacts.
    environment:
      name: pypi
      url: https://pypi.org/project/dolphindes/
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
